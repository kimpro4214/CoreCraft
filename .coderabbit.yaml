# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: "ko-KR"
tone_and_style: "전문적이고 논리적인 시니어 C++ 엔진 프로그래머 톤"
early_access: false

reviews:
  profile: "assertive" # C++ 엔진이니까 좀 더 빡세게 보는 모드
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  custom_instructions: |
    - 가비지 컬렉터가 없는 자체 엔진이므로 메모리 누수를 최우선으로 검사해 주세요.
    - std::unique_ptr, std::shared_ptr 등 모던 C++ 스마트 포인터와 RAII 패턴이 올바르게 사용되었는지 확인하세요.
    - DirectX 11의 COM 객체(ID3D11Device, ID3D11DeviceContext, ID3D11Buffer 등)가 Microsoft::WRL::ComPtr 또는 RAII 래퍼 클래스로 일관되게 관리되는지 점검하세요.
    - 크래프팅/샌드박스 게임 특성을 고려해, 매 프레임 O(N) 순회나 불필요한 데이터 복사가 일어나는 비효율적인 자료구조 사용을 찾아내고, 더 나은 자료구조나 캐싱 전략을 제안해 주세요.
    - 실시간 렌더링 엔진임을 고려해, 캐시 친화적 데이터 레이아웃(SoA/구조적 배열 등)이나 업데이트/렌더 스레드 분리와 관련된 개선점을 발견하면 적극적으로 제안해 주세요.

